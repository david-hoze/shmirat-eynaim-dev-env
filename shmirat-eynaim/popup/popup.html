<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Shmirat Eynaim</h1>

    <div class="toggle-row">
      <span class="label">Filter Active</span>
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="stats-row">
      <span id="stats">0 scanned, 0 hidden</span>
    </div>

    <div class="site-row">
      <span class="domain" id="domain">&mdash;</span>
      <button id="whitelist-btn" class="btn">Trust this site</button>
    </div>

    <div class="server-row">
      <h2>Shared Server</h2>
      <p id="server-status" class="server-status">Connecting...</p>
    </div>

    <div class="cloud-row">
      <h2>Cloud API (Claude Haiku)</h2>
      <div class="api-key-row">
        <input type="password" id="api-key" placeholder="Anthropic API key" autocomplete="off">
        <button id="save-key-btn" class="btn">Save</button>
      </div>
      <div class="cloud-mode-row">
        <label><input type="radio" name="cloud-mode" value="all"> All images</label>
        <label><input type="radio" name="cloud-mode" value="uncertain"> Uncertain only</label>
        <label><input type="radio" name="cloud-mode" value="never"> Local only</label>
      </div>
      <p id="cloud-stats" class="cloud-stats">No API key set.</p>
    </div>

    <div class="learning-row">
      <h2>Learning</h2>
      <p id="learning-stats">No faces learned yet.</p>
      <p id="classifier-status" class="classifier-status">Custom model: not enough data</p>
      <div class="learning-actions">
        <button id="reset-btn" class="btn danger">Reset Learning</button>
        <button id="export-btn" class="btn">Export</button>
        <button id="import-btn" class="btn">Import</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </div>

    <div class="whitelist-section">
      <h2>Trusted Sites</h2>
      <ul id="whitelist-list" class="whitelist-list"></ul>
      <p id="empty-msg" class="empty">No trusted sites.</p>
    </div>
  </div>

  <script src="popup-idris.js"></script>
</body>
</html>
