<!DOCTYPE html>

  <title>Test: Performance — 55 Images</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, 210px); gap: 12px; }
    .grid img { width: 200px; height: 150px; object-fit: cover; border-radius: 8px; }
    .timer-box {
      position: sticky; top: 0; z-index: 100;
      background: white; padding: 12px 16px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); margin-bottom: 20px;
    }
    .timer-box h2 { margin: 0 0 8px 0; font-size: 16px; }
    .timer-box .metric { font-family: monospace; font-size: 14px; margin: 4px 0; }
  </style>
</head>
<body>
  <h1>Performance Test Page (55 Images)</h1>
  <p>Tests extension performance with 55 landscape/object images from picsum.photos.</p>

  <div class="timer-box" id="timer-box">
    <h2>Performance Metrics</h2>
    <div class="metric" id="metric-status">Status: Waiting for extension...</div>
    <div class="metric" id="metric-load">Page load time: measuring...</div>
    <div class="metric" id="metric-process">Extension processing time: measuring...</div>
    <div class="metric" id="metric-total">Total images: 55</div>
    <div class="metric" id="metric-processed">Images processed: checking...</div>
  </div>

    <img src="https://picsum.photos/seed/img1/200/150" alt="img 1" data-test="perf">

    <img src="https://picsum.photos/seed/img11/200/150" alt="img 11" data-test="perf">
    <img src="https://picsum.photos/seed/img12/200/150" alt="img 12" data-test="perf">

    <img src="https://picsum.photos/seed/img15/200/150" alt="img 15" data-test="perf">

    <img src="https://picsum.photos/seed/img19/200/150" alt="img 19" data-test="perf">

    <img src="https://picsum.photos/seed/img53/200/150" alt="img 53" data-test="perf">
    <img src="https://picsum.photos/seed/img54/200/150" alt="img 54" data-test="perf">
    <img src="https://picsum.photos/seed/img55/200/150" alt="img 55" data-test="perf">
  </div>

  <script>
    const pageStart = performance.now();

    // Record when all images finish loading
    let imagesLoaded = 0;
    const totalImages = document.querySelectorAll('img[data-test="perf"]').length;
    let allImagesLoadedTime = null;

    document.querySelectorAll('img[data-test="perf"]').forEach(img => {
      const handler = () => {
        imagesLoaded++;
        if (imagesLoaded === totalImages) {
          allImagesLoadedTime = performance.now();
          document.getElementById('metric-load').textContent =
            `Page load time: ${(allImagesLoadedTime - pageStart).toFixed(0)}ms (all ${totalImages} images loaded)`;
        }
      };
      img.addEventListener('load', handler);
      img.addEventListener('error', handler);
    });

    // Check extension processing at intervals
    function checkProcessing() {
      const imgs = document.querySelectorAll('img[data-test="perf"]');
      let processed = 0;
      imgs.forEach(img => {
        // Check if the extension has added any class or attribute to mark it as processed
        if (img.classList.contains('shmirat-eynaim-blocked') ||
            img.classList.contains('shmirat-eynaim-safe') ||
            img.dataset.shmiratProcessed ||
            img.hasAttribute('data-shmirat-processed')) {
          processed++;
        }
      });
      return processed;
    }

    // Poll for extension processing completion
    const pollStart = performance.now();
    let processingDone = false;
    const pollInterval = setInterval(() => {
      const processed = checkProcessing();
      document.getElementById('metric-processed').textContent =
        `Images processed: ${processed}/${totalImages}`;

      if (processed === totalImages && !processingDone) {
        processingDone = true;
        const elapsed = performance.now() - pageStart;
        document.getElementById('metric-process').textContent =
          `Extension processing time: ${elapsed.toFixed(0)}ms (all ${totalImages} images processed)`;
        document.getElementById('metric-status').textContent =
          `Status: Complete — all ${totalImages} images processed`;
        document.getElementById('metric-status').style.color = '#27ae60';
        clearInterval(pollInterval);
      }
    }, 500);

    // Final report after 30 seconds regardless
    setTimeout(() => {
      clearInterval(pollInterval);
      const processed = checkProcessing();
      const elapsed = performance.now() - pageStart;

      if (!processingDone) {
        document.getElementById('metric-process').textContent =
          `Extension processing time: ${elapsed.toFixed(0)}ms elapsed (timeout — ${processed}/${totalImages} processed)`;
        document.getElementById('metric-status').textContent =
          processed === 0
            ? 'Status: Extension may not be active (0 images processed after 30s)'
            : `Status: Timeout — ${processed}/${totalImages} images processed in 30s`;
        document.getElementById('metric-status').style.color = processed === 0 ? '#e74c3c' : '#f39c12';
      }

      document.getElementById('metric-processed').textContent =
        `Images processed: ${processed}/${totalImages}`;

      // Log detailed timing to console
      console.log('=== Performance Test Results ===');
      console.log(`Total images: ${totalImages}`);
      console.log(`Images processed: ${processed}`);
      console.log(`Total elapsed: ${elapsed.toFixed(0)}ms`);
      if (allImagesLoadedTime) {
        console.log(`All images loaded at: ${(allImagesLoadedTime - pageStart).toFixed(0)}ms`);
      }
    }, 30000);
  </script>
</body>
</html>
