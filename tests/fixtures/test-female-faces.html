<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test: Female Faces — All Should Be Hidden</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, 250px); gap: 16px; }
    .grid img { width: 240px; height: 180px; object-fit: cover; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Female Face Test Page</h1>
  <p>All images below contain female faces and should be hidden by the extension.</p>
  <p><em>Note: These use public domain / CC0 placeholder images from picsum or generated test images.</em></p>

  <div class="grid">
    <!--
      For actual testing, replace these with real image URLs of female portraits.
      The test harness will check that these get the shmirat-eynaim-blocked class.
      Using picsum as placeholder — Claude Code should replace with actual test images.
    -->
    <img src="https://randomuser.me/api/portraits/women/1.jpg" alt="portrait 1" data-test="female">
    <img src="https://randomuser.me/api/portraits/women/2.jpg" alt="portrait 2" data-test="female">
    <img src="https://randomuser.me/api/portraits/women/3.jpg" alt="portrait 3" data-test="female">
    <img src="https://randomuser.me/api/portraits/women/4.jpg" alt="portrait 4" data-test="female">
    <img src="https://randomuser.me/api/portraits/women/5.jpg" alt="portrait 5" data-test="female">
    <img src="https://randomuser.me/api/portraits/women/6.jpg" alt="portrait 6" data-test="female">
  </div>

  <div id="results" style="margin-top: 40px; padding: 16px; background: white; border-radius: 8px;">
    <h2>Test Results</h2>
    <p id="count">Checking...</p>
    <script>
      setTimeout(() => {
        const imgs = document.querySelectorAll('img[data-test="female"]');
        let hidden = 0;
        imgs.forEach(img => {
          const s = getComputedStyle(img);
          if (s.display === 'none' || s.visibility === 'hidden' || parseFloat(s.opacity) === 0 || img.classList.contains('shmirat-eynaim-blocked')) {
            hidden++;
          }
        });
        document.getElementById('count').textContent =
          `${imgs.length} female images, ${hidden} hidden. ${hidden === imgs.length ? '✅ PASS — all hidden' : '❌ FAIL — ' + (imgs.length - hidden) + ' images leaked through'}`;
      }, 12000);
    </script>
  </div>
</body>
</html>
